services:
  db:
    image: pgvector/pgvector:pg17
    container_name: personal-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-agent_vectors}
      TZ: America/Lima
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agent_vectors}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── YouTube worker (yt-dlp + API, ~1-2 min build) ──────────────────────
  yt-worker:
    build:
      context: .
      dockerfile: services/youtube/Dockerfile
    container_name: personal-agent-yt
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OBSIDIAN_VAULT_PATH=/app/vault
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - BROWSER_PROFILES_DIR=/app/profiles
      - TZ=America/Lima
    volumes:
      - ./profiles:/app/profiles
      - ./logs:/app/logs
      - ./vault:/app/vault
      - uv-cache-yt:/root/.cache/uv
    command: ["uv", "run", "python", "-m", "yt_worker.main"]
    healthcheck:
      test: ["CMD", "test", "-d", "/proc/1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── Arxiv worker (arxiv lib, ~1 min build) ─────────────────────────────
  arxiv-worker:
    build:
      context: .
      dockerfile: services/arxiv/Dockerfile
    container_name: personal-agent-arxiv
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OBSIDIAN_VAULT_PATH=/app/vault
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - BROWSER_PROFILES_DIR=/app/profiles
      - TZ=America/Lima
    volumes:
      - ./logs:/app/logs
      - ./vault:/app/vault
      - uv-cache-arxiv:/root/.cache/uv
    command: ["uv", "run", "python", "-m", "arxiv_worker.main"]
    healthcheck:
      test: ["CMD", "test", "-d", "/proc/1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── FB Marketplace worker (Playwright + crawl4ai, ~6 min build) ────────
  fb-worker:
    build:
      context: .
      dockerfile: services/fb/Dockerfile
    container_name: personal-agent-fb
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OBSIDIAN_VAULT_PATH=/app/vault
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - BROWSER_PROFILES_DIR=/app/profiles
      - TZ=America/Lima
    volumes:
      - ./profiles:/app/profiles
      - ./logs:/app/logs
      - ./vault:/app/vault
      - uv-cache-fb:/root/.cache/uv
    command: ["uv", "run", "python", "-m", "fb_worker.main"]
    healthcheck:
      test: ["CMD", "test", "-d", "/proc/1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  pgdata:
  uv-cache-yt:
  uv-cache-arxiv:
  uv-cache-fb:
