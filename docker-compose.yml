services:
  db:
    image: pgvector/pgvector:pg17
    container_name: personal-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_secret
      POSTGRES_DB: agent_vectors
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_vectors"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-agent
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - OBSIDIAN_VAULT_PATH=/app/vault
      - DATABASE_URL=postgresql://agent:agent_secret@db:5432/agent_vectors
    volumes:
      # Persistent browser profiles (pre-created on a desktop machine)
      - ./profiles:/app/profiles

      # Logs
      - ./logs:/app/logs

      # Obsidian vault – local directory for testing
      # For production, mount your OneDrive/vault here
      - ./vault:/app/vault

    # Default: scheduler daemon
    command: ["uv", "run", "python", "-m", "src.main"]

    # Health check: verify the process is running
    healthcheck:
      test: ["CMD", "pgrep", "-f", "src.main"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  pgdata:
